{% extends 'dashboard/base.html' %}
{% block title %}My Profile - CareerPath AI{% endblock %}

{% block content %}
<div class="container-narrow">
  <div class="page-header">
    <h1 class="page-title">My Profile</h1>
    <p class="page-subtitle">Keep your personal and background information up to date</p>
    <p style="color:var(--text-muted); font-size:14px; margin-top:8px;">
      <i class="fa-solid fa-envelope" style="margin-right:6px;"></i>{{ user.email }}
    </p>
  </div>

  <!-- Profile Information Card -->
  <div class="card" style="margin-bottom:32px;">
    <h3 style="margin-bottom:20px;">Profile information</h3>
    <form method="post" action="{% url 'dashboard:profile' %}">
      {% csrf_token %}
      
      <div class="form-group">
        <label for="full_name">Full name</label>
        <input type="text" id="full_name" name="full_name" class="form-control" value="{{ request.user.full_name }}">
      </div>
      
      <div class="form-group">
        <label for="current_field">Current field / background</label>
        <input type="text" id="current_field" name="current_field" class="form-control" value="{{ profile.current_field }}" placeholder="e.g. Accounting">
      </div>
      
      <div class="form-group">
        <label for="experience_level">Experience level</label>
        <select id="experience_level" name="experience_level" class="form-control">
          <option value="beginner" {% if profile.experience_level == 'beginner' %}selected{% endif %}>Beginner</option>
          <option value="intermediate" {% if profile.experience_level == 'intermediate' %}selected{% endif %}>Intermediate</option>
          <option value="advanced" {% if profile.experience_level == 'advanced' %}selected{% endif %}>Advanced</option>
        </select>
      </div>
      
      <button type="submit" class="btn-primary">Save profile</button>
    </form>
  </div>
</div>
{% endblock %}
